namespace: MollieTest

include:
  - tests/MollieTest/*/*

support_namespace: Support

paths:
  tests: tests
  output: tests/_output
  data: tests/Support/Data
  support: tests/Support
  envs: tests/_envs

actor_suffix: Tester

extensions:
  enabled:
    - Codeception\Extension\RunFailed

params:
  - tests/default.yml
  - env

modules:
  enabled:
    - \FondOfCodeception\Module\Spryker
  config:
    \FondOfCodeception\Module\Spryker:
        generate_transfer: true