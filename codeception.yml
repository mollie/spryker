namespace: MollieTest

include:
  - tests/MollieTest/*/*

support_namespace: Support

paths:
  tests: tests
  output: tests/_output
  data: tests/Support/Data
  support: tests/Support
  envs: tests/_envs

actor_suffix: Tester

extensions:
  enabled:
    - Codeception\Extension\RunFailed

params:
  - tests/default.yml
  - env

coverage:
  enabled: true
  include:
    - src/*.php

modules:
  enabled:
    - \FondOfCodeception\Module\Spryker
  config:
    \FondOfCodeception\Module\Spryker:
      transfer: src/Mollie/Shared/Mollie/Transfer/mollie.transfer.xml
      generate_transfer: true
      generate_map_classes: true
      generate_propel_classes: true
      generate_ide_auto_completion: true

env:
  standalone:
    modules:
      config:
        \FondOfCodeception\Module\Spryker:
          generate_transfer: true
          generate_map_classes: true
          generate_propel_classes: true
          generate_ide_auto_completion: true