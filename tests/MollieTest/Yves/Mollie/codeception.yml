namespace: MollieTest\Yves\Mollie

paths:
    tests: .
    data: ../../../_data
    support: _support
    log: ../../../_output
    output: ../../../_output

coverage:
    enabled: true
    remote: false
    whitelist: { include: ['../../../../src/*'] }

suites:
    Yves:
        path: .
        class_name: MollieYvesTester
        modules:
            enabled:
              - Asserts
              - \SprykerTest\Shared\Testify\Helper\Environment
              - \SprykerTest\Client\Testify\Helper\FactoryHelper
              - \SprykerTest\Shared\Testify\Helper\LocatorHelper:
                  projectNamespaces: [ 'Mollie' ]
