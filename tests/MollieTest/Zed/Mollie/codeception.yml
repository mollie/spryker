namespace: MollieTest\Zed\Mollie

paths:
  tests: .
  output: _output
  data: _data
  support: _support

coverage:
  enabled: true
  remote: false
  whitelist: { include: ['../../../../src/*'] }

suites:
  Business:
    path: .
    actor: FacadeBusinessTester
    modules:
      enabled:
        - Asserts
        - \SprykerTest\Shared\Testify\Helper\Environment
        - \SprykerTest\Shared\Testify\Helper\ConfigHelper
        - \SprykerTest\Shared\Testify\Helper\LocatorHelper:
            projectNamespaces: ['Mollie']
        - \MollieTest\Zed\Mollie\Helper\MollieFacadeHelper
