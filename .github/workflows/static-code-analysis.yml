name: Static Code Analysis

on:
  push:
    branches:
      - main  # Change this to your main branch name
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      -   name: Checkout code
          uses: actions/checkout@v4

      -   name: Set up Docker Compose
          run: |
            sudo curl -L "https://github.com/docker/compose/releases/download/v2.39.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          if: runner.os == 'Linux'

      -   name: Build and run containers
          run: |
            docker-compose -f docker-compose.yml up php --detach --wait --wait-timeout 30
          working-directory: ./

      -   name: Installing composer dependencies
          run: |
            docker-compose exec php composer install
          working-directory: ./

      -   name: Execute code sniffer
          run: |
            docker-compose exec php vendor/bin/phpcs --standard=phpcs.xml ./src -v
          working-directory: ./

      -   name: Execute phpstan
          run: |
            docker-compose exec php  vendor/bin/phpstan analyse ./src -v
          working-directory: ./

      -   name: Execute project architecture sniffer
          run: |
            docker-compose exec php  vendor/bin/phpmd src/Mollie/ text vendor/spryker/project-architecture-sniffer/src/ruleset.xml --minimumpriority 4
          working-directory: ./


      -   name: Stop and remove containers
          run: |
            docker-compose -f docker-compose.yml down
          working-directory: ./
