name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    if: false # This disables all jobs in the 'validate' workflow for now
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Composer Normalize (dry-run if available)
        run: |
          if composer normalize --version >/dev/null 2>&1; then
            composer normalize --dry-run
          else
            echo "composer-normalize not installed, skipping."
          fi

      - name: PHP Lint
        run: |
          if [ -d src ]; then find src -type f -name "*.php" -print0 | xargs -0 -I{} php -l {}; fi
          if [ -d config ]; then find config -type f -name "*.php" -print0 | xargs -0 -I{} php -l {}; fi

      - name: PHPStan (if configured)
        run: |
          if [ -f phpstan.neon ] && [ -x vendor/bin/phpstan ]; then
            vendor/bin/phpstan analyse --no-progress
          else
            echo "PHPStan not configured or not installed, skipping."
          fi

      - name: Architecture Sniffer (if configured)
        run: |
          if [ -f architecture-sniffer.json ] && [ -x vendor/bin/architecture-sniffer ]; then
            vendor/bin/architecture-sniffer detect
          else
            echo "Architecture Sniffer not configured or not installed, skipping."
          fi

      - name: PHP CodeSniffer (if available)
        run: |
          if [ -x vendor/bin/phpcs ]; then
            vendor/bin/phpcs -p
          else
            echo "PHPCS not installed, skipping."
          fi

      - name: Easy Coding Standard (if configured)
        run: |
          if [ -f ecs.php ] && [ -x vendor/bin/ecs ]; then
            vendor/bin/ecs check src --no-progress
          else
            echo "ECS not configured or not installed, skipping."
          fi
