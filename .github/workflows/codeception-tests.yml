name: Spryker Module CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: spryker
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: spryker_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:7.17.9
        env:
          discovery.type: single-node
          xpack.security.enabled: false
        options: >-
          --health-cmd "curl -f http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 9200:9200

    strategy:
      matrix:
        php-version: ['8.2']

    steps:
      - name: Checkout module code
        uses: actions/checkout@v4
        with:
          path: module-code

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, intl, pdo_pgsql, redis, bcmath, gmp, json, xml, zip, curl, grpc, protobuf
          coverage: none
          tools: composer:v2
        env:
          fail-fast: false

      - name: Verify PHP extensions
        run: |
          php -m | grep -i grpc || echo "grpc extension not available, will use platform ignore"
          php -m | grep -i protobuf || echo "protobuf extension not available, will use platform ignore"

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Checkout Spryker B2C Demo Shop
        uses: actions/checkout@v4
        with:
          repository: spryker-shop/b2c-demo-shop
          ref: master  # or specific version tag like '202404.0'
          path: spryker-project

      - name: Install Spryker dependencies
        working-directory: spryker-project
        run: |
          # Remove composer.lock if it exists to avoid lock file issues
          if [ -f composer.lock ]; then
            echo "Removing existing composer.lock to avoid platform issues..."
            rm composer.lock
          fi
          
          # Install with platform requirements ignored for optional extensions
          composer install \
            --no-interaction \
            --prefer-dist \
            --optimize-autoloader \
            --ignore-platform-req=ext-grpc \
            --ignore-platform-req=ext-protobuf \
            --no-scripts
          
          echo "Composer install completed successfully"
        env:
          COMPOSER_MEMORY_LIMIT: -1

      - name: Get module name from composer.json
        id: module-info
        run: |
          # Install jq if not available
          which jq || sudo apt-get update && sudo apt-get install -y jq
          
          # Extract module name from composer.json
          FULL_NAME=$(jq -r '.name' module-code/composer.json)
          MODULE_NAME=$(echo $FULL_NAME | cut -d'/' -f2)
          
          echo "Full package name: $FULL_NAME"
          echo "Module name: $MODULE_NAME"
          echo "name=$MODULE_NAME" >> $GITHUB_OUTPUT

      - name: Link module into Spryker project
        run: |
          MODULE_NAME="${{ steps.module-info.outputs.name }}"
          rm -rf "spryker-project/vendor/spryker/$MODULE_NAME"
          mkdir -p "spryker-project/vendor/spryker/$MODULE_NAME"
          cp -r module-code/* "spryker-project/vendor/spryker/$MODULE_NAME/"

      - name: Run Spryker propel install
        working-directory: spryker-project
        run: |
          # Install propel if not already done
          vendor/bin/console propel:install --no-interaction || echo "Propel install skipped or failed, continuing..."
        continue-on-error: true

      - name: Setup Spryker configuration
        working-directory: spryker-project
        run: |
          # Copy environment configuration
          cp config/Shared/config_default.php config/Shared/config_local.php
          
          # Create test database configuration
          cat > config/Shared/config_test.php << 'EOF'
          <?php
          
          use Spryker\Shared\Application\ApplicationConstants;
          use Spryker\Shared\Propel\PropelConstants;
          use Spryker\Shared\Search\SearchConstants;
          use Spryker\Shared\Storage\StorageConstants;
          
          $config[PropelConstants::ZED_DB_USERNAME] = 'spryker';
          $config[PropelConstants::ZED_DB_PASSWORD] = 'secret';
          $config[PropelConstants::ZED_DB_DATABASE] = 'spryker_test';
          $config[PropelConstants::ZED_DB_HOST] = '127.0.0.1';
          $config[PropelConstants::ZED_DB_PORT] = 5432;
          $config[PropelConstants::ZED_DB_ENGINE] = 'pgsql';
          
          $config[SearchConstants::ELASTICA_PARAMETER__HOST] = '127.0.0.1';
          $config[SearchConstants::ELASTICA_PARAMETER__PORT] = 9200;
          
          $config[StorageConstants::STORAGE_REDIS_HOST] = '127.0.0.1';
          $config[StorageConstants::STORAGE_REDIS_PORT] = 6379;
          $config[StorageConstants::STORAGE_REDIS_DATABASE] = 0;
          
          $config[ApplicationConstants::ENABLE_APPLICATION_DEBUG] = true;
          EOF

      - name: Setup Codeception
        working-directory: spryker-project
        run: |
          # Ensure codeception is available
          if [ ! -f "vendor/bin/codecept" ]; then
            composer require --dev codeception/codeception --no-interaction
          fi

      - name: Run module tests
        working-directory: spryker-project
        run: |
          MODULE_NAME="${{ steps.module-info.outputs.name }}"
          MODULE_PATH="vendor/spryker/$MODULE_NAME"
          
          # Convert module name to StudlyCase for namespace
          MODULE_CLASS=$(echo $MODULE_NAME | sed -r 's/(^|-)([a-z])/\U\2/g')
          
          echo "Running tests for module: $MODULE_CLASS"
          
          # Check which test suites exist and run them
          if [ -f "$MODULE_PATH/codeception.yml" ]; then
            vendor/bin/codecept run -c "$MODULE_PATH" --coverage-xml
          else
            echo "No codeception.yml found, checking for test directories..."
            
            # Try to run tests directly if codeception config doesn't exist
            if [ -d "$MODULE_PATH/tests" ]; then
              vendor/bin/codecept run -c vendor/bin/codecept.yml \
                --override "paths: tests: $MODULE_PATH/tests" \
                --coverage-xml || echo "Tests execution completed with status: $?"
            else
              echo "No tests directory found in module"
              exit 1
            fi
          fi

      - name: Run PHPStan (if configured)
        working-directory: spryker-project
        run: |
          MODULE_NAME="${{ steps.module-info.outputs.name }}"
          MODULE_PATH="vendor/spryker/$MODULE_NAME"
          
          if [ -f "$MODULE_PATH/phpstan.neon" ] || [ -f "$MODULE_PATH/phpstan.neon.dist" ]; then
            if [ ! -f "vendor/bin/phpstan" ]; then
              composer require --dev phpstan/phpstan --no-interaction
            fi
            vendor/bin/phpstan analyse -c "$MODULE_PATH/phpstan.neon" "$MODULE_PATH/src" || echo "PHPStan analysis completed"
          else
            echo "No PHPStan configuration found, skipping static analysis"
          fi

      - name: Run Code Sniffer (if configured)
        working-directory: spryker-project
        run: |
          MODULE_NAME="${{ steps.module-info.outputs.name }}"
          MODULE_PATH="vendor/spryker/$MODULE_NAME"
          
          if [ ! -f "vendor/bin/phpcs" ]; then
            composer require --dev squizlabs/php_codesniffer --no-interaction
          fi
          
          vendor/bin/phpcs "$MODULE_PATH/src" --standard=vendor/spryker/code-sniffer/Spryker/ruleset.xml --ignore=*/Generated/* || echo "Code sniff completed"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-php-${{ matrix.php-version }}
          path: |
            spryker-project/tests/_output/
            spryker-project/tests/_log/
          retention-days: 7
