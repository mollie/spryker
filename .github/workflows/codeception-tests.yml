name: Module Functional Tests

on:
  push:
    branches:
      - main
  pull_request:

env:
  APPLICATION_STORE: DE
  APPLICATION_ENV: ci.mysql
  SPRYKER_CURRENT_REGION: EU
  PROGRESS_TYPE: plain
  SPRYKER_PLATFORM_IMAGE: spryker/php:8.4
  DYNAMIC_STORE_MODE: true
  COMPOSER_IGNORE_CHROMEDRIVER: 1

jobs:
  module-tests:
    name: Run Module Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # 1️⃣ Checkout your code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Install Composer dependencies
      - uses: ramsey/composer-install@v3
        with:
          composer-options: "-q --ignore-platform-reqs --optimize-autoloader --no-interaction --prefer-install=auto"

      # 3️⃣ Configure sysctl limits for Docker
      - name: Configure sysctl limits
        run: |
          sudo sysctl -w vm.swappiness=10
          sudo sysctl -w fs.file-max=262144
          sudo sysctl -w vm.max_map_count=262144
          ulimit -n 65536

      # 4️⃣ Start Spryker Docker environment
      - name: Start Spryker environment
        run: |
          git clone --depth 1 https://github.com/spryker/docker-sdk.git ./docker
          docker/sdk boot deploy.ci.functional.mariadb.yml -a --apcu
          docker/sdk up -t

      # 5️⃣ Prepare Spryker database and transfers
      - name: Prepare Spryker for Module Tests
        run: |
          docker/sdk testing console transfer:generate
          docker/sdk testing console propel:schema:copy
          docker/sdk testing console propel:model:build
          docker/sdk testing console transfer:entity:generate
          docker/sdk testing console setup:db

      # 6️⃣ Run your module Codeception tests
      - name: Run Module Functional Tests
        run: |
            docker/sdk testing codecept run -c codeception.yml -vv

      # 7️⃣ Cleanup Docker containers
      - name: Cleanup Docker
        if: always()
        run: |
          docker/sdk down -v
