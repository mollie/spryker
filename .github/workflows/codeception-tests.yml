name: Mollie-Tests-CI

on:
    pull_request:
    push:
        branches:
            - main
            - master
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    functional-tests:
        name: "Functional Tests"
        runs-on: ubuntu-latest
        env:
            PROGRESS_TYPE: plain
            SPRYKER_PLATFORM_IMAGE: spryker/php:8.4
            TRAVIS: 1
            SPRYKER_CURRENT_REGION: EU
            DYNAMIC_STORE_MODE: true
            COMPOSER_IGNORE_CHROMEDRIVER: 1
            APPLICATION_STORE: DE

        steps:
            - name: Checkout Mollie Package
              uses: actions/checkout@v4
              with:
                  path: spryker-payment

            - name: Clone Spryker B2B Demoshop
              run: |
                  git clone --depth 1 https://github.com/spryker-shop/b2b-demo-shop.git b2b-demo-shop

            - name: Install Mollie Package into Demoshop
              working-directory: b2b-demo-shop
              run: |
                  composer config repositories.mollie-local path ../spryker-payment
                  composer require "mollie/spryker-payment:*" --prefer-source --no-interaction --ignore-platform-reqs --optimize-autoloader

            - name: Configure sysctl limits
              run: |
                  sudo sysctl -w vm.swappiness=10
                  sudo sysctl -w fs.file-max=262144
                  sudo sysctl -w vm.max_map_count=262144
                  ulimit -n 65536

            - name: Run Docker Environment
              working-directory: b2b-demo-shop
              run: |
                  git clone --depth 1 https://github.com/spryker/docker-sdk.git ./docker
                  docker/sdk boot deploy.ci.functional.mariadb.yml -a --apcu
                  docker/sdk up -t
                  docker/sdk cli composer dump-autoload -o -a --apcu -q

            - name: Run Mollie Functional Tests
              working-directory: b2b-demo-shop
              run: |
                  docker/sdk testing codecept run -c vendor/mollie/spryker-payment