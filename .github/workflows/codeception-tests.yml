name: Spryker Module CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      APPLICATION_ENV: ci.mysql
      APPLICATION_STORE: DE
      PROJECT: suite
      SPRYKER_CURRENT_REGION: EU
      COMPOSER_IGNORE_CHROMEDRIVER: 1

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: spryker
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: spryker_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:7.17.9
        env:
          discovery.type: single-node
          xpack.security.enabled: false
        options: >-
          --health-cmd "curl -f http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 9200:9200

    strategy:
      matrix:
        php-version: ['8.3']

    steps:
      - name: Checkout module code
        uses: actions/checkout@v4
        with:
          path: module-code

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, intl, pdo_pgsql, redis, bcmath, gmp, json, xml, zip, curl, grpc, protobuf
          coverage: none
          tools: composer:v2
        env:
          fail-fast: false

      - name: Verify PHP extensions
        run: |
          php -m | grep -i grpc || echo "grpc extension not available, will use platform ignore"
          php -m | grep -i protobuf || echo "protobuf extension not available, will use platform ignore"

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Checkout Spryker B2C Demo Shop
        uses: actions/checkout@v4
        with:
          repository: spryker-shop/b2c-demo-shop
          ref: master  # or specific version tag like '202404.0'
          path: spryker-project

      - name: Install Spryker dependencies
        working-directory: spryker-project
        run: |
          # Remove composer.lock if it exists to avoid lock file issues
          if [ -f composer.lock ]; then
            echo "Removing existing composer.lock to avoid platform issues..."
            rm composer.lock
          fi
          
          # Install with platform requirements ignored for optional extensions
          composer install \
            --no-interaction \
            --prefer-dist \
            --optimize-autoloader \
            --ignore-platform-req=ext-grpc \
            --ignore-platform-req=ext-protobuf \
            --no-scripts
          
          echo "Composer install completed successfully"
        env:
          COMPOSER_MEMORY_LIMIT: -1

      - name: Get module name from composer.json
        id: module-info
        run: |
          # Install jq if not available
          which jq || sudo apt-get update && sudo apt-get install -y jq
          
          # Extract full package name from composer.json
          FULL_NAME=$(jq -r '.name' module-code/composer.json)
          VENDOR=$(echo $FULL_NAME | cut -d'/' -f1)
          MODULE_NAME=$(echo $FULL_NAME | cut -d'/' -f2)
          
          echo "Full package name: $FULL_NAME"
          echo "Vendor: $VENDOR"
          echo "Module name: $MODULE_NAME"
          echo "vendor=$VENDOR" >> $GITHUB_OUTPUT
          echo "name=$MODULE_NAME" >> $GITHUB_OUTPUT
          echo "full_name=$FULL_NAME" >> $GITHUB_OUTPUT

      - name: Link module into Spryker project
        working-directory: spryker-project
        run: |
          VENDOR="${{ steps.module-info.outputs.vendor }}"
          MODULE_NAME="${{ steps.module-info.outputs.name }}"
          FULL_NAME="$VENDOR/$MODULE_NAME"
          
          echo "Linking $VENDOR/$MODULE_NAME into Spryker project..."
          
          # Remove existing module if present
          rm -rf "vendor/$VENDOR/$MODULE_NAME"
          
          # Add path repository to composer.json
          composer config repositories.local-module path ../module-code
          
          # Require the module from the local path
          composer require "$FULL_NAME"
          
          echo "Module $FULL_NAME installed from local path"

      - name: Initialize test database
        working-directory: spryker-project
        run: |
          # Wait for PostgreSQL to be ready
          for i in {1..30}; do
            PGPASSWORD=secret psql -h 127.0.0.1 -U spryker -d spryker_test -c "SELECT 1" > /dev/null 2>&1 && break
            echo "Waiting for PostgreSQL to be ready... ($i/30)"
            sleep 2
          done
          
          echo "PostgreSQL is ready!"

      - name: Setup Spryker configuration
        working-directory: spryker-project
        run: |
          # Copy environment configuration
          if [ -f config/Shared/config_default.php ]; then
            cp config/Shared/config_default.php config/Shared/config_local.php
          fi
          
          # Create test database configuration
          cat > config/Shared/config_local.php << 'EOF'
          <?php
          
          use Spryker\Shared\Propel\PropelConstants;
          use Spryker\Shared\Search\SearchConstants;
          use Spryker\Shared\Storage\StorageConstants;
          use Spryker\Shared\Application\ApplicationConstants;
          use Spryker\Shared\Kernel\KernelConstants;
          use Mollie\Shared\Mollie\MollieConfig;
          use Mollie\Shared\Mollie\MollieConstants;
          
          // Database Configuration
          $config[PropelConstants::ZED_DB_USERNAME] = 'spryker';
          $config[PropelConstants::ZED_DB_PASSWORD] = 'secret';
          $config[PropelConstants::ZED_DB_DATABASE] = 'spryker_test';
          $config[PropelConstants::ZED_DB_HOST] = '127.0.0.1';
          $config[PropelConstants::ZED_DB_PORT] = 5432;
          $config[PropelConstants::ZED_DB_ENGINE] = $config[PropelConstants::ZED_DB_ENGINE_PGSQL] = 'pgsql';
          $config[PropelConstants::USE_SUDO_TO_MANAGE_DATABASE] = false;
          
          // Force TCP connection instead of Unix socket
          $config[PropelConstants::ZED_DB_ENGINE_PGSQL] = 'pgsql';
          
          // Elasticsearch Configuration
          $config[SearchConstants::ELASTICA_PARAMETER__HOST] = '127.0.0.1';
          $config[SearchConstants::ELASTICA_PARAMETER__PORT] = 9200;
          
          // Redis Configuration
          $config[StorageConstants::STORAGE_REDIS_HOST] = '127.0.0.1';
          $config[StorageConstants::STORAGE_REDIS_PORT] = 6379;
          $config[StorageConstants::STORAGE_REDIS_DATABASE] = 0;
          
          $sprykerFrontendHost = getenv('SPRYKER_FE_HOST') ?: 'not-configured-host';
          $sprykerGlueBackendHost = 'not-configured-host';
          
          // Application Configuration
          $config[ApplicationConstants::ENABLE_APPLICATION_DEBUG] = true;
          $config[KernelConstants::ENABLE_CONTAINER_OVERRIDING] = true;
          $config[KernelConstants::RESOLVABLE_CLASS_NAMES_CACHE_ENABLED] = false;
          $config[KernelConstants::CORE_NAMESPACES] = [
              'SprykerShop',
              'SprykerEco',
              'Spryker',
              'SprykerSdk',
              'Mollie',
          ];
          
          // ----------------------------------------------------------------------------
          // ------------------------------ Mollie API -------------------------------
          // ----------------------------------------------------------------------------
          $config[MollieConstants::MOLLIE] = [
              MollieConstants::MOLLIE_PROFILE_ID => 'pfl_pD5UernhAv',
              MollieConstants::MOLLIE_TEST_MODE => true,
              MollieConstants::MOLLIE_API_KEY => getenv('MOLLIE_API_KEY') ?: 'test_123',
          
              MollieConstants::MOLLIE_REDIRECT_URL => sprintf('https://%s%s', $sprykerFrontendHost, '/checkout/payment-redirect'),
              MollieConstants::MOLLIE_WEBHOOK_URL => sprintf('https://%s%s', $sprykerFrontendHost, '/mollie/webhook'),
              MollieConstants::MOLLIE_CREDIT_CARD_COMPONENTS_ENABLED => true,
              MollieConstants::MOLLIE_CREDIT_CARD_COMPONENTS_JS_SRC => 'https://js.mollie.com/v1/mollie.js',
              MollieConstants::MOLLIE_TEST_ENVIRONMENT_WEBHOOK_URL => sprintf(
                  'http://%s:%s@%s%s',
                  getenv('SPRYKER_YVES_AUTH_USERNAME') ?? null,
                  getenv('SPRYKER_YVES_AUTH_PASSWORD') ?? null,
                  $sprykerFrontendHost,
                  '/mollie/webhook',
              ),
              MollieConstants::MOLLIE_OMS_TO_PAYMENT_METHOD_MAPPING => [
                  'mollieCreditCardPayment' => 'creditcard',
                  'molliePayPalPayment' => 'paypal',
                  'mollieBankTransferPayment' => 'banktransfer',
                  'mollieKlarnaPayment' => 'klarna',
                  'mollieKlarnaPayLaterPayment' => 'klarna',
                  'mollieKlarnaPayNowPayment' => 'klarna',
                  'mollieKlarnaSliceItPayment' => 'klarna',
                  'mollieEpsPayment' => 'eps',
                  'mollieIdealPayment' => 'ideal',
                  'mollieBancontactPayment' => 'bancontact',
                  'mollieKbcPayment' => 'kbc',
                  'molliePayByBankPayment' => 'paybybank',
              ],
          ];
          
          EOF
          
          # Also create config_test.php for test environment
          cp config/Shared/config_local.php config/Shared/config_test.php

      - name: Generate transfer objects
        working-directory: spryker-project
        run: vendor/bin/console transfer:generate

      - name: Generate transfer databuilder objects
        working-directory: spryker-project
        run: vendor/bin/console transfer:databuilder:generate

      - name: Propel install
        working-directory: spryker-project
        run: |
          vendor/bin/console propel:schema:copy
          vendor/bin/console propel:model:build
          vendor/bin/console transfer:entity:generate
          vendor/bin/console propel:diff
          vendor/bin/console propel:migrate
          vendor/bin/console setup:init-db 

      - name: Setup Codeception
        working-directory: spryker-project
        run: |
          # Ensure codeception is available
          if [ ! -f "vendor/bin/codecept" ]; then
            composer require --dev codeception/codeception --no-interaction
          fi

      - name: Build Codeception files
        working-directory: spryker-project
        run: |
          VENDOR="${{ steps.module-info.outputs.vendor }}"
          MODULE_NAME="${{ steps.module-info.outputs.name }}"
          MODULE_PATH="vendor/$VENDOR/$MODULE_NAME"
          vendor/bin/codecept build -c "$MODULE_PATH"

      - name: Run module tests
        working-directory: spryker-project
        run: |
          VENDOR="${{ steps.module-info.outputs.vendor }}"
          MODULE_NAME="${{ steps.module-info.outputs.name }}"
          MODULE_PATH="vendor/$VENDOR/$MODULE_NAME"
          vendor/bin/codecept run -c "$MODULE_PATH"