name: Codeception Tests

on:
  push:
    branches: [master]
  pull_request:

env:
  PROGRESS_TYPE: plain
  SPRYKER_PLATFORM_IMAGE: spryker/php:8.2
  APPLICATION_STORE: DE
  APPLICATION_ENV: ci.mysql
  SPRYKER_CURRENT_REGION: EU
  COMPOSER_IGNORE_CHROMEDRIVER: 1

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout package
        uses: actions/checkout@v4
        with:
          path: package

      - name: Read package name
        id: package
        run: |
          echo "name=$(php -r "echo json_decode(file_get_contents('package/composer.json'), true)['name'];")" >> $GITHUB_OUTPUT

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('**/composer.lock') }}

      - name: Configure system limits
        run: |
          sudo sysctl -w vm.swappiness=10
          sudo sysctl -w fs.file-max=262144
          sudo sysctl -w vm.max_map_count=262144
          ulimit -n 65536

      - name: Bootstrap Spryker project
        run: |
          git clone --depth 1 https://github.com/spryker/docker-sdk.git docker
          mkdir demoshop
          cd demoshop
          ../docker/sdk boot deploy.ci.api.mariadb.robot.yml
          ../docker/sdk up -t
          ../docker/sdk cli composer dump-autoload -o -a

      - name: Install package
        run: |
          cd demoshop
          ../docker/sdk cli composer config repositories.package path ../package
          ../docker/sdk cli composer require ${{ steps.package.outputs.name }}:* --dev

      - name: Install robotframework-suite-tests
        run: |
          cd demoshop
          VERSION=$(php -r "echo json_decode(file_get_contents('../package/composer.json'), true)['require-dev']['spryker/robotframework-suite-tests'] ?? 'dev-master';")
          ../docker/sdk cli composer require spryker/robotframework-suite-tests:$VERSION --dev --no-interaction

      - name: Build Codeception
        run: |
          cd demoshop
          ../docker/sdk cli vendor/bin/codecept build \
            -c vendor/${{ steps.package.outputs.name }}/codeception.yml

      - name: Run Codeception tests
        run: |
          cd demoshop
          ../docker/sdk testing codecept run \
            -c vendor/${{ steps.package.outputs.name }}/codeception.yml -vvv

      - name: Show logs on failure
        if: failure()
        run: |
          cd demoshop
          ../docker/sdk logs | tail -200

      - name: Cleanup
        if: always()
        run: |
          cd demoshop
          ../docker/sdk down -v
