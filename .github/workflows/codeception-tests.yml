name: Codeception Tests

on:
  push:
    branches:
      - main  # Change this to your main branch name
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      -   name: Checkout code
          uses: actions/checkout@v4

      -   name: Set up Docker Compose
          run: |
            sudo curl -L "https://github.com/docker/compose/releases/download/v2.39.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          if: runner.os == 'Linux'

      -   name: Build and run containers
          run: |
            docker-compose -f docker-compose.yml up php --detach --wait --wait-timeout 30
          working-directory: ./  # Change this to your project's directory

      -   name: Installing composer dependencies
          run: |
            docker-compose exec php composer install
          working-directory: ./  # Change this to your project's directory

      - name: Clone B2B DemoShop
        run: |
          git clone --depth 1 https://github.com/spryker/b2b-demoshop.git ./project

      - name: Clone Docker SDK
        run: git clone --depth 1 https://github.com/spryker/docker-sdk.git ./docker

      - name: Boot Spryker Environment
        run: |
          cd ./project
          docker/sdk boot deploy.ci.functional.mariadb.yml
          docker/sdk up -t
          docker/sdk cli composer dump-autoload -o -a --apcu

      -   name: Run tests
          run: |
            docker-compose exec php  vendor/bin/codecept -c ./codeception.yml build -v
            docker-compose exec php  vendor/bin/codecept run
          working-directory: ./  # Change this to your project's directory

      -   name: Stop and remove containers
          run: |
            docker-compose -f docker-compose.yml down
          working-directory: ./  # Change this to your project's directory